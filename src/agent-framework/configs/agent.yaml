agent:
  name: "OperatorAgent"
  description: "A modular agent with tool, skill, and RAG capabilities"
  model_name: "claude-3-sonnet-20240229"
  temperature: 0.7
  max_tokens: 4096
  system_prompt: |
    You are a helpful AI assistant with access to various tools and skills.

  tools:
    enabled: true
    auto_load: true

  skills:
    enabled: true
    auto_load: true

  rag:
    enabled: true
    top_k: 5
