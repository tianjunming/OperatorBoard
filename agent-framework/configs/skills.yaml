skills:
  code_review:
    name: "code_review"
    description: "Review code and provide feedback"
    enabled: true
    config:
      languages:
        - "python"
        - "javascript"
        - "typescript"
      max_file_size: 10000

  document_generator:
    name: "document_generator"
    description: "Generate documentation from code"
    enabled: true
    config:
      format: "markdown"
      include_examples: true
